name: Deploy BALA conversational AI

on:
  workflow_dispatch:
  push:
    branches: ["main"]

jobs:
  deploy:
    if: ${{ vars.ENABLE_CLOUDFLARE_DEPLOY == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy . --project-name=bala-health-guide
